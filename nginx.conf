# HTTP server — used as the Traefik backend (Traefik terminates TLS, proxies HTTP
# here).  For direct HTTP access (no proxy) non-WebSocket paths redirect to HTTPS.
#
# WebSocket upgrade locations are NEVER redirected: a WebSocket client cannot
# follow an HTTP 301 redirect, so redirecting produces a 1006 close code.
# Traefik does not forward X-Forwarded-Proto for WebSocket upgrade requests, so
# all WebSocket locations are listed without any redirect guard.
server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Redirect plain HTTP to HTTPS for non-WebSocket paths.
    # Skipped when Traefik is in front (sets X-Forwarded-Proto: https).
    set $do_redirect 1;
    if ($http_x_forwarded_proto = "https") {
        set $do_redirect 0;
    }

    # ── WebSocket locations — no redirect guard ───────────────────────────────
    # These are always proxied. Without `if` blocks, proxy_pass URI substitution
    # works correctly and there is no "if is evil" interaction.

    location /vnc {
        proxy_pass http://pve-backend:5001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }

    location /ws/docker-exec {
        proxy_pass http://docker-api:8080/containers/exec/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }

    location /ws/k8s-exec {
        proxy_pass http://k8s-api:8081/pods/exec/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }

    location /ws/ {
        proxy_pass http://pve-backend:5001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }

    # VS Code Server lab — deferred DNS resolution so nginx starts even when the
    # lab container is not yet running.
    location ^~ /codeserver/ {
        resolver 127.0.0.11 valid=10s;
        set $codeserver http://lab-codeserver:8080;
        rewrite ^/codeserver/(.*) /$1 break;
        proxy_pass $codeserver;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_hide_header X-Frame-Options;
        proxy_read_timeout 3600s;
        proxy_connect_timeout 10s;
    }

    # Chromium lab via KasmVNC.
    location ^~ /chromium/ {
        resolver 127.0.0.11 valid=10s;
        set $chromium http://lab-chromium:3000;
        proxy_pass $chromium;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_hide_header X-Frame-Options;
        proxy_read_timeout 3600s;
        proxy_connect_timeout 10s;
    }

    # ── HTTP locations — redirect to HTTPS for direct access ─────────────────

    # Lab launch/stop can take minutes on first run (image pull).
    location ~* ^/api/labs/[^/]+/(launch|stop)$ {
        if ($do_redirect = 1) {
            return 301 https://$host$request_uri;
        }
        proxy_pass http://pve-backend:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_read_timeout 300s;
    }

    location /api/ {
        if ($do_redirect = 1) {
            return 301 https://$host$request_uri;
        }
        proxy_pass http://pve-backend:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_read_timeout 60s;
    }

    location / {
        if ($do_redirect = 1) {
            return 301 https://$host$request_uri;
        }
        try_files $uri $uri/ /index.html;
    }
}

server {
    listen 443 ssl;
    server_name localhost;

    ssl_certificate     /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    root /usr/share/nginx/html;
    index index.html;

    # Include default MIME types
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Enable gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/json application/javascript;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Handle React Router - serve index.html for all routes
    # This allows client-side routing to work properly
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Handle config.js specially (may be generated at runtime)
    location /config.js {
        try_files /config.js =404;
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Lab launch/stop endpoints — image pulls can take several minutes on first run.
    location ~* ^/api/labs/[^/]+/(launch|stop)$ {
        proxy_pass http://pve-backend:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 300s;
    }

    # Proxy API calls to pve-backend — same origin, no CORS
    location /api/ {
        proxy_pass http://pve-backend:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    # Proxy VNC WebSocket through nginx (eliminates direct port 5001 requirement)
    location /vnc {
        proxy_pass http://pve-backend:5001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }

    # Proxy SSH terminal WebSocket through nginx
    location /ws/terminal {
        proxy_pass http://pve-backend:5001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }

    # Proxy Docker container exec WebSocket directly to docker-api
    location /ws/docker-exec {
        proxy_pass http://docker-api:8080/containers/exec/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }

    # Proxy Kubernetes pod exec WebSocket directly to k8s-api
    location /ws/k8s-exec {
        proxy_pass http://k8s-api:8081/pods/exec/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }

    # Proxy VS Code Server (code-server lab).
    # The container is named lab-codeserver and joined to the portal-network.
    # code-server runs with --auth none and serves at its root (/). All URLs
    # it generates are relative, so stripping /codeserver/ before proxying
    # is sufficient — no sub_filter rewriting is needed.
    #
    # Using a variable defers DNS resolution to request time so nginx starts
    # cleanly even when the container doesn't exist yet.
    # 127.0.0.11 is Docker's embedded DNS server (always present in containers).
    location ^~ /codeserver/ {
        resolver 127.0.0.11 valid=10s;
        set $codeserver http://lab-codeserver:8080;
        rewrite ^/codeserver/(.*) /$1 break;
        proxy_pass $codeserver;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        # Strip code-server's own X-Frame-Options so the server-level
        # SAMEORIGIN header is the only one, and same-origin iframing works.
        proxy_hide_header X-Frame-Options;
        proxy_read_timeout 3600s;
        proxy_connect_timeout 10s;
    }

    # Proxy Chromium browser (chromium lab) served by linuxserver/chromium via KasmVNC.
    # The container is named lab-chromium and joined to the portal-network.
    # SUBFOLDER=/chromium/ is set in the container so KasmVNC serves its UI and
    # WebSocket endpoint at /chromium/ — the path is passed through unchanged.
    #
    # Using a variable defers DNS resolution to request time so nginx starts
    # cleanly even when the container doesn't exist yet.
    location ^~ /chromium/ {
        resolver 127.0.0.11 valid=10s;
        set $chromium http://lab-chromium:3000;
        proxy_pass $chromium;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_hide_header X-Frame-Options;
        proxy_read_timeout 3600s;
        proxy_connect_timeout 10s;
    }

    # Health check endpoint (optional)
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}

